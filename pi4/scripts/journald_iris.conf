[Journal]
# RD-031 (S131): bound journal size so log spam cannot exhaust RAM/SD.
# Journal is volatile (/run) per 40-rpi-volatile-storage.conf, so RuntimeMaxUse is
# the effective cap; SystemMaxUse is set too in case storage becomes persistent.
SystemMaxUse=50M
RuntimeMaxUse=50M

# --- DEPLOY / RESTORE (version-controlled record; NOT auto-deployed) -----------
# Live path: /etc/systemd/journald.conf.d/iris.conf  (drop-in; overrides main conf)
# The main /etc/systemd/journald.conf is left at distro default — all IRIS journal
# overrides live in this drop-in (systemd's recommended pattern).
#
# This replaced a prior drop-in (pre-S131) that EXPANDED limits to
# SystemMaxUse=500M + MaxRetentionSec=1year — counterproductive for RD-031.
#
# To restore/reinstall (system path — must SD-persist individually):
#   sudo cp journald_iris.conf /etc/systemd/journald.conf.d/iris.conf
#   sudo mount -o remount,rw /media/root-ro
#   sudo cp /etc/systemd/journald.conf.d/iris.conf /media/root-ro/etc/systemd/journald.conf.d/iris.conf
#   sync && sudo mount -o remount,ro /media/root-ro
#   sudo systemctl restart systemd-journald
#   # verify: systemd-analyze cat-config systemd/journald.conf | grep MaxUse  -> 50M/50M
