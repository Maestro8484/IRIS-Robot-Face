[platformio]
src_dir = .

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
  arminjo/ServoEasing @ ^3.3.3
  madhephaestus/ESP32Servo @ ^3.0.6
  sparkfun/SparkFun APDS9960 RGB and Gesture Sensor @ ^1.4.3
monitor_speed = 9600

; --- Pi4 remote flash (no physical access to SuperMaster needed) ---
; 1. Claude runs: pio run   (builds firmware.bin on SuperMaster)
; 2. Claude SFTPs: .pio/build/esp32/firmware.bin → Pi4 /tmp/servo_firmware.bin
; 3. Claude SSH Pi4: python3 -m esptool --port /dev/ttyUSB0 write_flash 0x0 /tmp/servo_firmware.bin
; Requires: python3-esptool installed on Pi4 (sudo apt install python3-esptool)
; No BOOT button needed — CH340 auto-reset works once firmware is running.
